# Vela VPS relay — nginx site for your.domain.com
# Install:
#   sudo cp deploy/nginx-vela.conf /etc/nginx/sites-available/vela
#   sudo ln -sfn /etc/nginx/sites-available/vela /etc/nginx/sites-enabled/vela
#   sudo nginx -t && sudo systemctl reload nginx

server {
    server_name your.domain.com;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # WebSocket / tunnel support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for SSE /assistant/stream — do not buffer chunks
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Long-lived streams and websocket tunnels
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = your-domain.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name your-domain.com;
    return 404; # managed by Certbot
}
